<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tài Liệu Cá Nhân</title>
    <link rel="stylesheet" href="book.css">
    <!-- Nhúng thư viện Supabase CDN để gọi được lệnh ở file script.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h1>📚 KHO TÀI LIỆU CỦA TÔI</h1>

        <!-- Khu vực Tải lên tài liệu -->
        <div class="upload-section">
            <input type="file" id="file-input">
            <input type="text" id="category-input" placeholder="Nhập danh mục (vd: Học tập, Sách...)">
            <button id="upload-btn">Tải lên</button>
        </div>

        <hr>

        <!-- Khu vực hiển thị danh sách file -->
        <h2>Danh sách tài liệu đã lưu</h2>
        <div id="document-list" class="doc-grid">
            <!-- Tài liệu sẽ tự động hiển thị ở đây nhờ JavaScript -->
            <p>Đang tải tài liệu...</p>
        </div>
    </div>

    <script src="book.js"></script>
</body>
</html>
